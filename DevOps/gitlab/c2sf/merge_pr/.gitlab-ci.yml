pipeline_summary:
  image: docker-registry.c2sf.mil/cmis/rockylinux:latest
  stage: report
  when: always
  needs:
    - job: jira_ticket_apply_fortify_url
      artifacts: true
    - job: internal_code_scan
      artifacts: true
  script:
    - cd $CI_PROJECT_DIR
    - |
      echo "=== Workspace contents ==="
      find . -name "*scan_result.json" 2>/dev/null
      echo "=== Artifact count ==="
      find . -name "*scan_result.json" | wc -l
      echo "=== Contents of each scan_result.json ==="
      for f in $(find . -name "*scan_result.json"); do
        echo "--- $f ---"
        cat "$f"
      done

      python3 - <<'PYEOF'
      import json, os, glob, re

      # --- Load all scan_result.json artifacts from prior stages ---
      results = []
      for f in glob.glob('**/*_scan_result.json', recursive=True):
          with open(f) as fh:
              results.append(json.load(fh))

      branch       = os.environ['CI_COMMIT_REF_NAME']
      sha_short    = os.environ['CI_COMMIT_SHORT_SHA']
      pipeline_url = os.environ['CI_PIPELINE_URL']
      commit_msg   = os.environ.get('CI_COMMIT_MESSAGE', '')

      any_failed = any(r['status'] != 'success' for r in results)

      # --- Wiki markup, wrapped in a panel ---
      panel_color  = "#ffe0e0" if any_failed else "#e0ffe0"
      border_color = "#cc0000" if any_failed else "#00aa00"
      panel_title  = "CI Pipeline Report - FAILED" if any_failed else "CI Pipeline Report"

      body = [
          f"*Pipeline Report* — {{{{{branch}}}}} @ {{{{{sha_short}}}}}",
          f"[Full pipeline|{pipeline_url}]",
          "",
          "|| Job || Status || Issues || Link ||",
      ]
      for r in results:
          icon = "(/)" if r['status'] == 'success' else "(x)"
          issues = r.get('issues') or "None"
          body.append(f"| {r['job']} | {icon} {r['status']} | {issues} | [view|{r['url']}] |")
      body.append("")
      if any_failed:
          body.append("{color:red}(x) *Action required — see failed jobs above.*{color}")
      else:
          body.append("(/) *All checks passed.*")

      wiki_note = (
          f"{{panel:title={panel_title}|borderColor={border_color}|titleBGColor={panel_color}|bgColor=#ffffff}}\n"
          + "\n".join(body)
          + "\n{panel}"
      )

      with open('jira_comment.txt', 'w') as f:
          f.write(wiki_note)

      # --- Extract Jira key from commit message ---
      match = re.search(r'[A-Z][A-Z0-9]+-\d+', commit_msg)
      if match:
          with open('jira_issue_key.txt', 'w') as f:
              f.write(match.group(0))
      else:
          print("WARNING: no Jira key found in commit message")

      print(wiki_note)

      PYEOF

      if [ -f jira_issue_key.txt ]; then
        ISSUE_KEY=$(cat jira_issue_key.txt)
        BODY=$(python3 -c "import json; print(json.dumps(open('jira_comment.txt').read()))")
        curl --fail --show-error --insecure\
        -X POST \
        -H "Authorization: Bearer $JIRA_TOKEN" \
        -H 'Content-Type: application/json'\
        --data "{\"body\": ${BODY}}" \
        "https://jira.c2sf.mil/rest/api/2/issue/${ISSUE_KEY}/comment"
      else
        echo "Skipping Jira comment — no issue key found"
      fi
    - |
      # Exit after curl — fail the job if any stage failed
      if [ -f pipeline_failed.txt ] && [ "$(cat pipeline_failed.txt)" = "1" ]; then
        echo "One or more stages failed — failing pipeline summary"
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - jira_comment.txt
      - jira_issue_key.txt
    expire_in: 1 day

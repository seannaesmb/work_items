test-job:
  stage: test
  image: docker-registry.c2sf.mil/cmis/$DOCKER_CF_INFO:latest
  before_script:
    - mkdir -p $HOME/.docker
    - echo $DOCKER_AUTH_CONFIG > $HOME/.docker/config.json
  script:
    - jq --version
    - wc --version
    - find /app

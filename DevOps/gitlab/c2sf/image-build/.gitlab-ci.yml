variables:
  DOCKER_CF_INFO: "rockylinux"
  DOCKER_CF_TAG: "latest"

build-job:
  stage: build
  variables:
    DOCKER_CF_INFO: "rockylinux"
    DOCKER_CF_TAG: "9"
  before_script:
    - mkdir -p $HOME/.docker
    - echo $DOCKER_AUTH_CONFIG > $HOME/.docker/config.json
  script:
    - echo "Hello, $GITLAB_USER_LOGIN!"
    # - docker pull adobecoldfusion/coldfusion:latest-2021
    # - docker pull "$DOCKER_CF_INFO":"$DOCKER_CF_TAG"
    # echo "FROM $DOCKER_CF_INFO:$DOCKER_CF_TAG" >> dockerfile

    - |
      echo "FROM $DOCKER_CF_INFO:$DOCKER_CF_TAG" >> dockerfile

      echo "RUN dnf update -y && dnf install python3 git maven.noarch java-17-openjdk.x86_64 jq coreutils -y --allowerasing " >> dockerfile
      echo "RUN curl -sSL -o /opt/fcli.tgz https://github.com/fortify/fcli/releases/download/latest/fcli-linux.tgz" >> dockerfile
      echo "RUN tar -xvzf /opt/fcli.tgz" >> dockerfile
       echo "COPY . /app" >> dockerfile
       echo "WORKDIR /app" >> dockerfile
       echo "RUN cd /app && mvn clean && mvn package" >> dockerfile

    - docker build -t "$DOCKER_CF_INFO":"$DOCKER_CF_TAG" .

    - docker tag "$DOCKER_CF_INFO":"$DOCKER_CF_TAG" docker-registry.c2sf.mil/cmis/"$DOCKER_CF_INFO":latest
    - docker push docker-registry.c2sf.mil/cmis/"$DOCKER_CF_INFO":latest

